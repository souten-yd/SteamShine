---
name: build steamos artifact

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  steamos-runtime:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install SteamOS runtime build tools
        run: |
          pacman -Syy --noconfirm --needed archlinux-keyring
          pacman -S --noconfirm --needed --disable-download-timeout \
            git cmake ninja base-devel pkgconf python python-jinja nodejs npm clang shellcheck zstd binutils \
            libcap libdrm libevdev libnotify libpulse libva libx11 libxcb libxfixes libxrandr libxtst \
            miniupnpc openssl opus qt6-base qt6-svg shaderc udev vulkan-icd-loader wayland pipewire
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Format and shell checks
        run: |
          clang-format --dry-run --Werror src/steamos_virtual_session.cpp \
            src/steamos_virtual_session.h tests/unit/test_steamos_virtual_session.cpp
          shellcheck steamshine.sh scripts/*.sh tests/integration/test_steamshine_script.sh
          git -C "${GITHUB_WORKSPACE}" diff --check
      - name: Configure
        run: cmake -S . -B cmake-build-steamos -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_DOCS=OFF
      - name: Build
        run: cmake --build cmake-build-steamos --parallel 2
      - name: Test SteamOS virtual-session lifecycle
        run: |
          cmake --build cmake-build-steamos --target test_sunshine --parallel 2
          cmake-build-steamos/tests/test_sunshine --gtest_filter='*SteamOSVirtualSession*'
          tests/integration/test_steamshine_script.sh
      - name: Verify runtime linkage
        run: |
          ldd cmake-build-steamos/sunshine
          readelf -d cmake-build-steamos/sunshine
      - name: Stage and package
        run: scripts/package-steamos-artifact.sh cmake-build-steamos dist
      - uses: actions/upload-artifact@v4
        with:
          name: steamshine-steamos-x86_64-${{ github.sha }}
          path: dist/
          if-no-files-found: error
