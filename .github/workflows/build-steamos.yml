---
name: SteamOS Runtime Build

permissions:
  contents: read

concurrency:
  group: steamos-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - ".github/workflows/build-steamos.yml"
      - "src/steamos_virtual_session.cpp"
      - "src/steamos_virtual_session.h"
      - "src/platform/linux/**"
      - "src/nvhttp.cpp"
      - "src/nvhttp.h"
      - "src/stream.cpp"
      - "src/stream.h"
      - "src/process.cpp"
      - "src/process.h"
      - "src/config.cpp"
      - "src/config.h"
      - "tests/unit/test_steamos_virtual_session.cpp"
      - "tests/integration/test_steamshine_script.sh"
      - "scripts/**"
      - "steamshine.sh"
      - "CMakeLists.txt"
      - "cmake/**"
      - "packaging/linux/**"
  push:
    branches: [master]
    paths:
      - ".github/workflows/build-steamos.yml"
      - "src/steamos_virtual_session.cpp"
      - "src/steamos_virtual_session.h"
      - "src/platform/linux/**"
      - "src/nvhttp.cpp"
      - "src/nvhttp.h"
      - "src/stream.cpp"
      - "src/stream.h"
      - "src/process.cpp"
      - "src/process.h"
      - "src/config.cpp"
      - "src/config.h"
      - "tests/unit/test_steamos_virtual_session.cpp"
      - "tests/integration/test_steamshine_script.sh"
      - "scripts/**"
      - "steamshine.sh"
      - "CMakeLists.txt"
      - "cmake/**"
      - "packaging/linux/**"
  workflow_dispatch:

jobs:
  steamos-runtime:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install SteamOS runtime build tools
        run: |
          pacman -Syy --noconfirm --needed archlinux-keyring
          pacman -S --noconfirm --needed --disable-download-timeout \
            git cmake ninja base-devel pkgconf python python-jinja nodejs npm clang shellcheck actionlint zstd binutils boost nlohmann-json \
            libcap libdrm libevdev libnotify libpulse libva libx11 libxcb libxfixes libxrandr libxtst \
            miniupnpc openssl opus qt6-base qt6-svg shaderc udev vulkan-icd-loader wayland pipewire
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Mark workspace as safe for CMake version discovery
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Format and shell checks
        run: |
          clang-format --dry-run --Werror src/steamos_virtual_session.cpp \
            src/steamos_virtual_session.h src/nvhttp.cpp src/process.cpp src/stream.cpp \
            src/platform/linux/misc.cpp src/platform/linux/wayland.cpp \
            src/platform/linux/wlgrab.cpp tests/unit/test_steamos_virtual_session.cpp
          shellcheck steamshine.sh \
            scripts/diagnose-steamos-virtual-display.sh \
            scripts/package-steamos-artifact.sh \
            scripts/test-steamos-latency.sh \
            scripts/test-steamos-reconnect.sh \
            scripts/test-steamos-ssd-writes.sh \
            scripts/test-steamos-virtual-display.sh \
            tests/integration/test_steamshine_script.sh
          actionlint .github/workflows/build-steamos.yml
          ! grep -nE '[[:blank:]]+$|^(<<<<<<<|=======|>>>>>>>)' \
            src/steamos_virtual_session.cpp \
            src/steamos_virtual_session.h \
            src/nvhttp.cpp \
            src/process.cpp \
            src/stream.cpp \
            src/platform/linux/misc.cpp \
            src/platform/linux/wayland.cpp \
            src/platform/linux/wlgrab.cpp \
            tests/unit/test_steamos_virtual_session.cpp \
            steamshine.sh \
            scripts/diagnose-steamos-virtual-display.sh \
            scripts/package-steamos-artifact.sh \
            scripts/test-steamos-latency.sh \
            scripts/test-steamos-reconnect.sh \
            scripts/test-steamos-ssd-writes.sh \
            scripts/test-steamos-virtual-display.sh \
            tests/integration/test_steamshine_script.sh \
            .github/workflows/build-steamos.yml
      - name: Configure
        run: >-
          cmake -S . -B cmake-build-steamos -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTS=ON
          -DBUILD_DOCS=OFF
          -DSUNSHINE_ENABLE_CUDA=OFF
      - name: Build
        run: cmake --build cmake-build-steamos --target sunshine --parallel 2
      - name: Test SteamOS virtual-session lifecycle
        run: |
          cmake --build cmake-build-steamos --target test_sunshine --parallel 2
          cmake-build-steamos/tests/test_sunshine --gtest_filter='*SteamOSVirtualSession*'
          tests/integration/test_steamshine_script.sh
      - name: Verify runtime linkage
        run: |
          ldd cmake-build-steamos/sunshine
          readelf -d cmake-build-steamos/sunshine
      - name: Stage and package
        run: scripts/package-steamos-artifact.sh cmake-build-steamos dist
      - name: Smoke test immutable user-space installer
        run: |
          artifact="$(find dist -name 'steamshine-steamos-*.tar.zst' -print -quit)"
          test -n "${artifact}"
          (cd "$(dirname "${artifact}")" && sha256sum -c "$(basename "${artifact}").sha256")
          if tar --zstd -tf "${artifact}" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "Unsafe archive path" >&2
            exit 1
          fi
          smoke_home="$(mktemp -d)"
          mkdir -p "${smoke_home}/run"
          HOME="${smoke_home}" XDG_RUNTIME_DIR="${smoke_home}/run" \
            ./steamshine.sh install --artifact "${artifact}" --no-service --non-interactive --yes
          test -x "${smoke_home}/.local/bin/steamshine"
          test -f "${smoke_home}/.local/share/steamshine/current/BUILD_INFO.json"
          test -f "${smoke_home}/.local/share/steamshine/current/RUNTIME_DEPENDENCIES.txt"
          test -f "${smoke_home}/.local/share/steamshine/current/systemd-user/steamshine.service.in"
          test -x "${smoke_home}/.local/share/steamshine/current/scripts/diagnose-steamos-virtual-display.sh"
          test -x "${smoke_home}/.local/share/steamshine/current/scripts/test-steamos-virtual-display.sh"
          test -x "${smoke_home}/.local/share/steamshine/current/scripts/test-steamos-reconnect.sh"
          test -x "${smoke_home}/.local/share/steamshine/current/scripts/test-steamos-latency.sh"
          test -x "${smoke_home}/.local/share/steamshine/current/scripts/test-steamos-ssd-writes.sh"
          HOME="${smoke_home}" XDG_RUNTIME_DIR="${smoke_home}/run" \
            ./steamshine.sh uninstall --non-interactive --yes --no-service
      - uses: actions/upload-artifact@v4
        with:
          name: steamshine-steamos-x86_64-${{ github.sha }}
          path: dist/
          if-no-files-found: error
