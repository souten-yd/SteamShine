name: SteamOS Runtime Build

on:
  pull_request:
    paths:
      - '.github/workflows/build-steamos.yml'
      - '.github/workflows/build-ci-image.yml'
      - 'ci/steamos/**'
      - 'src/steamos_virtual_session.*'
      - 'src/steamos_virtual_session_core.*'
      - 'src/platform/linux/**'
      - 'src/nvhttp.*'
      - 'src/stream.*'
      - 'src/process.*'
      - 'src/config.*'
      - 'tests/unit/test_steamos_virtual_session.cpp'
      - 'tests/unit/test_steamos_virtual_session_core.cpp'
      - 'tests/steamos_core/CMakeLists.txt'
      - 'tests/steamos_lifecycle/**'
      - 'tests/integration/test_steamshine_script.sh'
      - 'tests/fixtures/steamos/**'
      - 'scripts/**'
      - 'steamshine.sh'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'packaging/linux/**'
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-steamos.yml'
      - '.github/workflows/build-ci-image.yml'
      - 'ci/steamos/**'
      - 'src/steamos_virtual_session.*'
      - 'src/steamos_virtual_session_core.*'
      - 'src/platform/linux/**'
      - 'src/nvhttp.*'
      - 'src/stream.*'
      - 'src/process.*'
      - 'src/config.*'
      - 'tests/unit/test_steamos_virtual_session.cpp'
      - 'tests/unit/test_steamos_virtual_session_core.cpp'
      - 'tests/steamos_core/CMakeLists.txt'
      - 'tests/steamos_lifecycle/**'
      - 'tests/integration/test_steamshine_script.sh'
      - 'tests/fixtures/steamos/**'
      - 'scripts/**'
      - 'steamshine.sh'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'packaging/linux/**'
  workflow_dispatch:
    inputs:
      full_validation:
        description: Run clean package validation
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: steamos-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
      categories: ${{ steps.classify.outputs.categories }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - id: classify
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          FORCE_FULL: ${{ github.ref == 'refs/heads/master' || inputs.full_validation }}
        run: |
          set -euo pipefail
          # A synchronized pull request is an incremental validation: the prior
          # head has already passed its own layer. Comparing the head commit to
          # its parent lets a docs-only follow-up stay docs-only instead of
          # rebuilding the cumulative pull request. First commits and unknown
          # history fail closed below when their parent cannot be read.
          base_sha="${HEAD_SHA}^"
          if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            base_sha="${HEAD_SHA}"
          fi
          changed="$(git diff --name-only "${base_sha}" "${HEAD_SHA}" || true)"
          git diff --check "${base_sha}" "${HEAD_SHA}"
          declare -A categories=()
          while IFS= read -r path; do
            [[ -n "${path}" ]] || continue
            case "${path}" in
              docs/*|*.md) categories[docs]=1 ;;
              packaging/linux/*|scripts/package-steamos-artifact.sh) categories[packaging]=1 ;;
              steamshine.sh|scripts/*.sh|tests/integration/test_steamshine_script.sh|tests/fixtures/steamos/*) categories[shell]=1 ;;
              src/steamos_virtual_session_core.*|tests/unit/test_steamos_virtual_session_core.cpp) categories[cpp-core]=1 ;;
              src/platform/linux/*|src/stream.*|src/process.*|src/nvhttp.*|src/config.*|src/steamos_virtual_session.*) categories[capture-encode]=1 ;;
              CMakeLists.txt|cmake/*|tests/CMakeLists.txt|.github/workflows/*|ci/steamos/*) categories[build-system]=1 ;;
              *) categories[unclassified]=1 ;;
            esac
          done <<<"${changed}"
          category_list="$(printf '%s\n' "${!categories[@]}" | sort | paste -sd, -)"
          mode=full
          if [[ "${FORCE_FULL}" != true && "${category_list}" == docs ]]; then mode=docs; fi
          if [[ "${FORCE_FULL}" != true && "${category_list}" == shell ]]; then mode=shell; fi
          if [[ "${FORCE_FULL}" != true && "${category_list}" == cpp-core ]]; then mode=cpp-core; fi
          printf 'mode=%s\n' "${mode}" >>"${GITHUB_OUTPUT}"
          printf 'categories=%s\n' "${category_list:-unclassified}" >>"${GITHUB_OUTPUT}"

  fast-validation:
    needs: classify-changes
    if: needs.classify-changes.outputs.mode != 'full'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/souten-yd/steamshine-ci@sha256:9ae61a6de9783fe4eeb2fa4d8a2f3669a41743c8dd23958e0eee1c7c193a0e88
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: ${{ needs.classify-changes.outputs.mode == 'cpp-core' && 'recursive' || 'false' }}
      - name: Focused fast validation
        shell: bash
        run: |
          set -euo pipefail
          # actions/checkout writes this setting in its temporary HOME.  The
          # subsequent container shell has a different HOME and must trust the
          # bind-mounted checkout before Git can initialise submodules.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          mode='${{ needs.classify-changes.outputs.mode }}'
          if [[ "${mode}" == docs ]]; then
            git diff --check HEAD^ HEAD
          fi
          if [[ "${mode}" == shell ]]; then
            shellcheck steamshine.sh scripts/*.sh tests/fixtures/steamos/fixture.sh tests/integration/test_steamshine_script.sh
            actionlint .github/workflows/build-steamos.yml .github/workflows/build-ci-image.yml
            tests/integration/test_steamshine_script.sh
          fi
          if [[ "${mode}" == cpp-core ]]; then
            cmake -S tests/steamos_core -B cmake-build-steamos-fast -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build cmake-build-steamos-fast --target test_steamos_virtual_session_core --parallel 2
            cmake-build-steamos-fast/test_steamos_virtual_session_core --gtest_color=yes
          fi

  full-validation:
    needs: classify-changes
    if: needs.classify-changes.outputs.mode == 'full'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/souten-yd/steamshine-ci@sha256:9ae61a6de9783fe4eeb2fa4d8a2f3669a41743c8dd23958e0eee1c7c193a0e88
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Artifacts must identify the reviewed PR head, not GitHub's
          # temporary refs/pull/*/merge commit. This also keeps BUILD_INFO,
          # the archive name, and the release-promotion provenance aligned.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # The upstream repository contains packaging- and non-Linux-only
          # submodules.  Checkout itself must stay bounded and reproducible;
          # initialise only the Linux runtime dependency closure below.
          submodules: false
      - name: Initialize SteamOS runtime submodules
        shell: bash
        run: |
          set -euo pipefail
          # The container shell has a different HOME from actions/checkout;
          # trust the bind-mounted repository before Git reads .gitmodules.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          git submodule update --init --depth 1 -- \
            third-party/Simple-Web-Server \
            third-party/build-deps \
            third-party/glad \
            third-party/inputtino \
            third-party/libdisplaydevice \
            third-party/lizardbyte-common \
            third-party/moonlight-common-c \
            third-party/nv-codec-headers \
            third-party/plasma-wayland-protocols \
            third-party/tray \
            third-party/wayland-protocols \
            third-party/wlr-protocols
          # These are the only nested repositories consumed by the Linux
          # runtime build and the isolated SteamOS GTest targets.  Do not
          # recurse into FFmpeg's optional codec trees or documentation trees.
          git -C third-party/build-deps submodule update --init --depth 1 -- \
            third-party/FFmpeg/Vulkan-Headers
          git -C third-party/lizardbyte-common submodule update --init --depth 1 -- \
            third-party/googletest
          git -C third-party/moonlight-common-c submodule update --init --recursive --depth 1
      - name: Focused formatting and shell checks
        run: |
          cd "${GITHUB_WORKSPACE}"
          clang-format --dry-run --Werror src/steamos_virtual_session.cpp src/steamos_virtual_session.h src/steamos_virtual_session_core.cpp src/steamos_virtual_session_core.h tests/unit/test_steamos_virtual_session.cpp tests/unit/test_steamos_virtual_session_core.cpp tests/steamos_lifecycle/stubs.cpp
          shellcheck steamshine.sh scripts/*.sh tests/fixtures/steamos/fixture.sh tests/integration/test_steamshine_script.sh
          actionlint .github/workflows/build-steamos.yml .github/workflows/build-ci-image.yml
          if grep -nE '[[:blank:]]+$|^(<<<<<<<|=======|>>>>>>>)' src/steamos_virtual_session.cpp src/steamos_virtual_session.h src/steamos_virtual_session_core.cpp src/steamos_virtual_session_core.h tests/unit/test_steamos_virtual_session.cpp tests/unit/test_steamos_virtual_session_core.cpp tests/steamos_lifecycle/stubs.cpp steamshine.sh scripts/*.sh tests/fixtures/steamos/fixture.sh tests/integration/test_steamshine_script.sh .github/workflows/build-steamos.yml .github/workflows/build-ci-image.yml; then exit 1; fi
      - name: Configure clean SteamOS release build
        run: cd "${GITHUB_WORKSPACE}" && cmake -S . -B cmake-build-steamos -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_DOCS=OFF -DSUNSHINE_ENABLE_CUDA=OFF -DFETCHCONTENT_SOURCE_DIR_BOOST=/opt/steamshine-deps/boost-1.89.0 -DFFMPEG_PREPARED_BINARIES=/opt/steamshine-deps/ffmpeg -DSUNSHINE_ASSETS_DIR=share/assets -DSUNSHINE_ASSETS_DIR_DEF=../share/assets
      - name: Build runtime binary
        run: cd "${GITHUB_WORKSPACE}" && cmake --build cmake-build-steamos --target sunshine --parallel 2
      - name: Record compile and link timing
        run: cd "${GITHUB_WORKSPACE}" && python3 scripts/collect-ninja-timing.py cmake-build-steamos/.ninja_log dist/build-timings.json
      - name: SteamOS virtual session and installer tests
        run: |
          cd "${GITHUB_WORKSPACE}"
          cmake -S tests/steamos_core -B cmake-build-steamos-core -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake-build-steamos-core --target test_steamos_virtual_session_core --parallel 2
          cmake-build-steamos-core/test_steamos_virtual_session_core --gtest_color=yes
          cmake -S tests/steamos_lifecycle -B cmake-build-steamos-lifecycle -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake-build-steamos-lifecycle --target test_steamos_virtual_session_lifecycle --parallel 2
          cmake-build-steamos-lifecycle/test_steamos_virtual_session_lifecycle --gtest_color=yes
          tests/integration/test_steamshine_script.sh
      - name: Verify runtime linkage and ABI ceiling
        run: |
          cd "${GITHUB_WORKSPACE}"
          binary=cmake-build-steamos/sunshine
          ldd -v "${binary}"; readelf -d "${binary}"; readelf --version-info "${binary}"
          if ldd "${binary}" | grep -q 'not found'; then exit 1; fi
          if readelf --version-info "${binary}" | grep -Eq 'GLIBC_2\.(4[2-9]|[5-9][0-9])|GLIBCXX_3\.4\.(3[5-9]|[4-9][0-9])|CXXABI_1\.(4|[5-9][0-9])|Qt_6\.(1[0-9]|[2-9][0-9])'; then exit 1; fi
      - name: Stage, package, and smoke test the same binary
        run: |
          cd "${GITHUB_WORKSPACE}"
          # The root-owned container bind mount must be explicitly trusted before
          # packaging reads the version from the checked-out Git repository.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          scripts/package-steamos-artifact.sh cmake-build-steamos dist
          artifact="$(find dist -name 'steamshine-steamos-*.tar.zst' -print -quit)"
          (cd "$(dirname "${artifact}")" && sha256sum -c "$(basename "${artifact}").sha256")
          smoke_home="$(mktemp -d)"; mkdir -p "${smoke_home}/run"
          HOME="${smoke_home}" XDG_RUNTIME_DIR="${smoke_home}/run" ./steamshine.sh install --artifact "${artifact}" --no-service --non-interactive --yes
          test -x "${smoke_home}/.local/bin/steamshine"
      - uses: actions/upload-artifact@v4
        with:
          name: steamshine-steamos-x86_64-${{ github.event.pull_request.head.sha || github.sha }}
          path: dist/
          if-no-files-found: error

  record-timings:
    needs: [classify-changes, fast-validation, full-validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Record job and step wall-clock timing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" --paginate >jobs.json
          jq '[.jobs[] | {name, started_at, completed_at, conclusion, steps: [.steps[] | {name, conclusion, started_at, completed_at, seconds: (if .started_at != null and .completed_at != null then ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601)) else null end)}]}]' jobs.json >ci-timings.json
      - uses: actions/upload-artifact@v4
        with:
          name: steamos-ci-timings-${{ github.event.pull_request.head.sha || github.sha }}
          path: ci-timings.json
          if-no-files-found: error
