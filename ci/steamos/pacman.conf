# SteamOS 3.8-compatible package configuration for the CI build container.
# This file is used only inside an ephemeral Arch container; SteamOS hosts are
# never modified by the build workflow or installer.
[options]
Architecture = auto
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 10

[jupiter-3.8.1x]
Include = /etc/pacman.d/steamshine-mirrorlist

[holo-3.8.1x]
Include = /etc/pacman.d/steamshine-mirrorlist

[core-3.8.1x]
Include = /etc/pacman.d/steamshine-mirrorlist

[extra-3.8.1x]
Include = /etc/pacman.d/steamshine-mirrorlist

[multilib-3.8.1x]
Include = /etc/pacman.d/steamshine-mirrorlist
